services:
  - type: web
    name: d2cflow-wa-bridge
    runtime: node
    rootDir: whatsapp-bridge
    buildCommand: npm install
    startCommand: node bridge.js
    envVars:
      - key: PYTHON_BACKEND
        sync: false   # set this to your Vercel URL in the Render dashboard
      - key: LOG_LEVEL
        value: info
