services:
  - type: web
    name: d2cflow-backend
    runtime: python
    buildCommand: pip install --no-cache-dir -r requirements.txt && npm install --production --prefix whatsapp-bridge
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_BASE_URL
        sync: false
      # WhatsApp bridge — set these only if you run the bridge on the same host
      # or expose it via a tunnel. Leave unset to disable bridge features.
      - key: WHATSAPP_BRIDGE_API
        sync: false
      - key: WHATSAPP_DB_PATH
        sync: false
      - key: WHATSAPP_DEVICE_DB
        sync: false
      - key: WHATSAPP_BRIDGE_BINARY
        sync: false
      - key: WHATSAPP_BRIDGE_DIR
        sync: false
      - key: D2CFLOW_STORE_DIR
        sync: false

  - type: web
    name: d2cflow-wa-bridge
    runtime: node
    rootDir: whatsapp-bridge
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PYTHON_BACKEND
        sync: false
      - key: LOG_LEVEL
        value: info
